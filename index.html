<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trash Free Hosting</title>

<style>

body{
    background:#0b1020;
    color:white;
    font-family:Arial;
    padding:30px;
}

.box{
    background:#121933;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input,button{
    padding:12px;
    border:none;
    border-radius:8px;
    margin:5px;
}

button{
    cursor:pointer;
    background:#5865f2;
    color:white;
}

#console{
    background:black;
    color:#00ff00;
    padding:10px;
    height:300px;
    overflow:auto;
    border-radius:10px;
    margin-top:20px;
    font-family:monospace;
}

.server-btn{
    display:block;
    width:100%;
    text-align:left;
    margin-top:10px;
    background:#1f2a4d;
}

</style>

</head>

<body>

<h1>Trash Free Hosting</h1>

<div class="box">

<h2>Create Server</h2>

<input id="server-name" placeholder="Server Name">

<input id="server-ram" type="number" value="1024">

<button onclick="createServer()">
Create Server
</button>

</div>

<div class="box">

<h2>Servers</h2>

<button onclick="loadServers()">
Refresh Servers
</button>

<div id="servers"></div>

</div>

<div class="box">

<h2>Controls</h2>

<button onclick="startServer()">
Start
</button>

<button onclick="stopServer()">
Stop
</button>

</div>

<div class="box">

<h2>Console</h2>

<div id="console"></div>

<input id="command" placeholder="say hello">

<button onclick="sendCommand()">
Send
</button>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const API =
"https://hosting.trashmcpe.com/backend";

let selectedServer = null;

const consoleBox =
document.getElementById("console");

function log(text){

    consoleBox.innerHTML +=
    text + "<br>";

    consoleBox.scrollTop =
    consoleBox.scrollHeight;

}

async function api(
    path,
    method="GET",
    body=null
){

    const res = await fetch(
        API + path,
        {
            method,
            headers:{
                "Content-Type":
                "application/json"
            },
            body:
            body ?
            JSON.stringify(body)
            :
            null
        }
    );

    return await res.json();

}

async function createServer(){

    const name =
    document.getElementById(
        "server-name"
    ).value;

    const ramMb =
    Number(
        document.getElementById(
            "server-ram"
        ).value
    );

    if(!name){

        alert("Enter name");

        return;

    }

    log("Creating server...");

    const data = await api(
        "/create-server",
        "POST",
        {
            name,
            ramMb
        }
    );

    console.log(data);

    log("Server created");

    loadServers();

}

async function loadServers(){

    const data =
    await api("/api/servers");

    console.log(data);

    const servers =
    document.getElementById(
        "servers"
    );

    servers.innerHTML = "";

    data.forEach((srv)=>{

        const s =
        srv.attributes || srv;

        const btn =
        document.createElement(
            "button"
        );

        btn.className =
        "server-btn";

        btn.innerHTML =
        s.name +
        " (" +
        s.identifier +
        ")";

        btn.onclick = ()=>{

            selectedServer =
            s.identifier;

            log(
                "Selected: " +
                s.name
            );

        };

        servers.appendChild(btn);

    });

}

async function startServer(){

    if(!selectedServer){

        alert("Select server");

        return;

    }

    await api(
        "/api/start-server/" +
        selectedServer,
        "POST"
    );

    log("Start signal sent");

}

async function stopServer(){

    if(!selectedServer){

        alert("Select server");

        return;

    }

    await api(
        "/api/stop-server/" +
        selectedServer,
        "POST"
    );

    log("Stop signal sent");

}

async function sendCommand(){

    const command =
    document.getElementById(
        "command"
    ).value;

    if(!selectedServer){

        alert("Select server");

        return;

    }

    await api(
        "/api/console/" +
        selectedServer,
        "POST",
        {
            command
        }
    );

    log("> " + command);

}

const socket = io(
    "https://hosting.trashmcpe.com",
    {
        transports:["websocket"]
    }
);

socket.on(
    "connect",
    ()=>{

        log(
            "Console connected"
        );

    }
);

socket.on(
    "console:line",
    (msg)=>{

        log(msg.line);

    }
);

loadServers();

</script>

</body>
</html>
